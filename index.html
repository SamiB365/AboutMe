<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duobotit</title>
    <meta name="description" content="Duobotit - tekninen tuki ja ohjelmistokehitys." />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="layout">
      <section class="left">
        <p class="kicker">Tervetuloa</p>
        <h1>Duobotit</h1>
        <p class="lead">
          Tarjoamme teknistä tukea ja ohjelmistokehitystä käytännönläheisesti.
          Tämä on uusi sivupohja, rakennettu selkeäksi ja kevyeksi.
        </p>
        <a class="btn" href="mailto:info@duobotit.fi">Ota yhteyttä</a>
      </section>

      <section class="right">
        <div class="cards-fan" aria-label="Videokortit">
          <article class="stack-card card-back-4" aria-hidden="true"></article>
          <article class="stack-card card-back-3" aria-hidden="true"></article>
          <article class="stack-card card-back-2" aria-hidden="true"></article>
          <article class="stack-card card-back-1" aria-hidden="true"></article>

          <article class="stack-card card-front">
            <video autoplay muted loop playsinline preload="metadata">
              <source src="./assets/videos/Ruutu2k.mp4" type="video/mp4" />
              Selaimesi ei tue videotoistoa.
            </video>
          </article>
        </div>
      </section>
    </main>

    <script src="./scripts/main.js"></script>
  </body>
</html>
